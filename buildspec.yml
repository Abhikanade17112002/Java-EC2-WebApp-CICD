version: 0.2

phases:
  install:
    runtime-versions:
      java: corretto17
    commands:
      - echo Installing dependencies

  pre_build:
    commands:
      - echo Build started on `date`

  build:
    commands:
      - echo Packaging the application
      - mvn clean package
      - mv target/*.jar app.jar

  post_build:
    commands:
      - echo Build completed on `date`

artifacts:
  files:
    - app.jar
    - Procfile
    - appspec.yml
    - scripts/**
  discard-paths: yes